[build]
  command = "cd ../.. && npm ci && npm run build -w @tma/app-museum"
  publish = "dist"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- apps/museum packages"

# /dashboard redirects to https://arkin.takemearound.gallery/dashboard/museum (vite netlify-redirects plugin).

# Required for the dashboard on takemearound.museum (set in Netlify UI, then redeploy):
#   VITE_API_PROXY_TARGET = https://YOUR-NGROK-OR-API-HOST.ngrok-free.app
# Optional alias (same effect at build time):
#   VITE_API_BASE_URL = same URL
